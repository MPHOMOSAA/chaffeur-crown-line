<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Crown Line Chauffeurs</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E8911A;--gld:#F5C518;--blk:#000;--d1:#0a0a0a;--d2:#111;--d3:#1a1a1a;--d4:#222;--wh:#fff;--wd:rgba(255,255,255,.65);--og:rgba(232,145,26,.22)}
body{font-family:Jost,sans-serif;background:var(--d1);color:var(--wh);min-height:100vh}
input,select,textarea{font-family:Jost,sans-serif;background:var(--d3);border:1px solid rgba(255,255,255,.1);color:var(--wh);border-radius:6px;padding:.7rem .95rem;width:100%;font-size:.93rem;outline:none;transition:border-color .3s}
input:focus,select:focus,textarea:focus{border-color:var(--or)}
select option{background:var(--d3)}textarea{resize:vertical}button{cursor:pointer;border:none;outline:none;background:none;font-family:Jost,sans-serif}a{text-decoration:none;color:inherit}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 30%,rgba(232,145,26,.1) 0%,transparent 65%)}
.lbox{background:var(--d2);border:1px solid rgba(232,145,26,.3);padding:3rem 2.5rem;width:100%;max-width:400px;text-align:center}
.llogo{height:70px;width:auto;object-fit:contain;margin:0 auto 1.5rem;filter:drop-shadow(0 0 12px var(--og))}
.lbox h1{font-family:Cinzel,serif;font-size:1.3rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.2rem}
.lbox p{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:2rem}
.fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem;text-align:left}
.fg label{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--wd)}
.err{color:#ff5050;font-size:.78rem;min-height:1em;margin-bottom:.4rem}
.btn-gold{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;background:linear-gradient(135deg,var(--or),var(--gld));color:var(--blk);font-family:Cinzel,serif;font-weight:700;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:.88rem 2rem;border-radius:2px;border:none;cursor:pointer;transition:transform .25s,box-shadow .25s;box-shadow:0 4px 20px var(--og);width:100%;margin-top:.5rem}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,145,26,.6)}
.btn-sm{padding:.38rem .9rem;font-size:.72rem;font-weight:600;border-radius:4px;cursor:pointer;transition:all .25s}
.btn-confirm{background:rgba(100,220,100,.12);border:1px solid rgba(100,220,100,.3);color:#64dc64}.btn-confirm:hover{background:rgba(100,220,100,.25)}
.btn-reject{background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.25);color:#ff5050}.btn-reject:hover{background:rgba(255,80,80,.2)}
.btn-danger{background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.25);color:#ff5050}.btn-danger:hover{background:rgba(255,80,80,.2)}
.btn-outline{display:inline-flex;align-items:center;gap:.4rem;background:transparent;color:var(--wd);font-size:.72rem;font-weight:600;letter-spacing:.08em;padding:.52rem 1.1rem;border-radius:2px;border:1px solid rgba(232,145,26,.35);cursor:pointer;transition:all .25s}
.btn-outline:hover{border-color:var(--or);color:var(--or)}
#panel{display:none;min-height:100vh;flex-direction:column}#panel.show{display:flex}
.topbar{background:rgba(0,0,0,.96);border-bottom:1px solid rgba(232,145,26,.2);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.tl{display:flex;align-items:center;gap:.9rem}.tl img{height:40px;object-fit:contain;filter:drop-shadow(0 0 6px var(--og))}
.tl h2{font-family:Cinzel,serif;letter-spacing:.15em;font-size:1.05rem;color:var(--or)}
.tr{display:flex;align-items:center;gap:1.2rem}
.tr a{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--wd);display:flex;align-items:center;gap:.3rem;transition:color .25s}
.tr a:hover{color:var(--or)}.logout{color:rgba(255,80,80,.7)!important}.logout:hover{color:#ff5050!important}
.tabs{background:var(--d2);border-bottom:1px solid rgba(255,255,255,.06);padding:0 2rem;display:flex}
.tab-btn{font-family:Cinzel,serif;font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:1rem 1.3rem;color:var(--wd);border-bottom:2px solid transparent;transition:all .25s;cursor:pointer;display:flex;align-items:center;gap:.4rem}
.tab-btn:hover{color:var(--wh)}.tab-btn.active{color:var(--or);border-bottom-color:var(--or)}
.tbadge{min-width:18px;height:18px;background:linear-gradient(135deg,var(--or),var(--gld));color:var(--blk);font-family:Jost,sans-serif;font-size:.6rem;font-weight:800;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.pc{flex:1;padding:2rem;max-width:1200px;margin:0 auto;width:100%}
.tpanel{display:none}.tpanel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.sc{background:var(--d2);border:1px solid rgba(255,255,255,.07);padding:1.25rem 1.5rem;border-radius:10px}
.sc-num{font-family:Cinzel,serif;font-size:2.2rem;font-weight:700;color:var(--or);letter-spacing:.05em;line-height:1}
.sc-lbl{font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;color:var(--wd);margin-top:.3rem}
.acard{background:var(--d2);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:1.75rem;margin-bottom:1.5rem}
.acard-t{font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--or);margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}.fg-grid .full{grid-column:1/-1}
.car-list{display:flex;flex-direction:column;gap:.7rem;max-height:520px;overflow-y:auto;padding-right:.4rem}
.car-list::-webkit-scrollbar{width:3px}.car-list::-webkit-scrollbar-thumb{background:rgba(232,145,26,.3);border-radius:3px}
.crow{display:flex;align-items:center;gap:.9rem;background:var(--d3);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:.75rem 1rem;transition:border-color .25s}
.crow:hover{border-color:rgba(232,145,26,.2)}
.cthumb{width:64px;height:44px;border-radius:4px;object-fit:cover;background:var(--d2);flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cname{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:.72rem;color:var(--wd);margin-top:.1rem}
.cbadge{font-family:Cinzel,serif;font-size:.5rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(135deg,var(--or),var(--gld));color:var(--blk);padding:.18rem .6rem;border-radius:2px;flex-shrink:0}
.bklist{display:flex;flex-direction:column;gap:.75rem}
.bkrow{background:var(--d3);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:1rem 1.25rem;display:flex;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.bkrow.pending{border-left:3px solid var(--or)}.bkrow.confirmed{border-left:3px solid #64dc64}.bkrow.rejected{border-left:3px solid #ff5050;opacity:.5}
.bkinfo{flex:1;min-width:180px}
.bkname{font-weight:700;font-size:.95rem;margin-bottom:.3rem}
.bkmeta{display:flex;flex-wrap:wrap;gap:.4rem .65rem}
.bkmeta span{font-size:.74rem;color:var(--wd);display:flex;align-items:center;gap:.22rem}
.bkmeta i{color:var(--or);font-size:.6rem;width:10px}
.bkst{font-family:Cinzel,serif;font-size:.5rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .62rem;border-radius:2px;align-self:flex-start}
.bkst.pending{background:rgba(232,145,26,.18);color:var(--or);border:1px solid rgba(232,145,26,.3)}
.bkst.confirmed{background:rgba(100,220,100,.12);color:#64dc64;border:1px solid rgba(100,220,100,.3)}
.bkst.rejected{background:rgba(255,80,80,.1);color:#ff5050;border:1px solid rgba(255,80,80,.2)}
.bkact{display:flex;gap:.4rem;align-self:flex-start}
.bkmsg{font-size:.78rem;color:var(--wd);margin-top:.5rem;padding:.45rem .7rem;background:rgba(255,255,255,.04);border-radius:4px;border-left:2px solid rgba(232,145,26,.3)}
.empty{text-align:center;padding:3rem;color:var(--wd)}
.empty i{font-size:2.5rem;color:var(--or);opacity:.2;margin-bottom:.75rem;display:block}
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.2rem}
.fbtn{padding:.35rem .85rem;font-family:Cinzel,serif;font-size:.54rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--wd);border-radius:2px;cursor:pointer;transition:all .25s}
.fbtn:hover{border-color:var(--or);color:var(--or)}.fbtn.active{background:linear-gradient(135deg,var(--or),var(--gld));color:var(--blk);border-color:transparent}
.acal{background:var(--d3);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:1.25rem}
.acal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.acal-hdr h4{font-family:Cinzel,serif;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase}
.acal-nav{width:28px;height:28px;border-radius:50%;background:var(--d4);border:1px solid rgba(255,255,255,.1);color:var(--wd);font-size:.68rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s}
.acal-nav:hover{background:var(--or);color:var(--blk);border-color:var(--or)}
.acal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:.5rem}
.acal-dn{text-align:center;font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:.3rem 0}
.acal-d{text-align:center;padding:.38rem .1rem;border-radius:4px;font-size:.72rem;color:var(--wd);min-height:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.acal-d.past{opacity:.25}.acal-d.today{border:1px solid rgba(232,145,26,.4);color:var(--or)}
.acal-d.hasbk{background:rgba(232,145,26,.2);border:1px solid rgba(232,145,26,.3);color:var(--or);cursor:pointer;font-weight:700}
.acal-d.hasbk:hover{background:rgba(232,145,26,.35)}
.acal-cnt{font-size:.58rem;font-weight:700;color:var(--gld)}
.addok{display:none;text-align:center;padding:.8rem;background:rgba(100,220,100,.1);border:1px solid rgba(100,220,100,.3);border-radius:6px;color:#64dc64;font-size:.83rem;margin-top:.75rem}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--d2);border:1px solid var(--or);padding:.85rem 1.5rem;font-size:.84rem;z-index:9999;box-shadow:0 4px 24px var(--og);transform:translateY(100px);opacity:0;transition:transform .3s,opacity .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr}.fg-grid{grid-template-columns:1fr}.pc{padding:1.25rem}.bkrow{flex-direction:column;gap:.75rem}.bkact{width:100%}}
  </style>
</head>

<script>
const AU='admin',AP='crownline2025';
const LSK='crownline_v4_cars',BKK='crownline_v4_bookings';
const FB='https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400&auto=format&fit=crop&q=60';
function gc(){try{const s=localStorage.getItem(LSK);return s?JSON.parse(s):[];}catch{return[];}}
function sc(c){localStorage.setItem(LSK,JSON.stringify(c));}
function gb(){try{return JSON.parse(localStorage.getItem(BKK)||'[]');}catch{return[];}}
function sb(b){localStorage.setItem(BKK,JSON.stringify(b));}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function fd(d){if(!d)return'N/A';try{return new Date(d).toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}
function fdt(d){if(!d)return'N/A';try{return new Date(d).toLocaleString('en-ZA',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch{return d;}}

function doLogin(){
  if(document.getElementById('lu').value.trim()===AU&&document.getElementById('lp').value===AP){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('panel').classList.add('show');
    renderAll();
  }else{document.getElementById('lerr').textContent='Invalid credentials.';document.getElementById('lp').value='';}
}
['lu','lp'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));
function doLogout(){document.getElementById('panel').classList.remove('show');document.getElementById('loginScreen').style.display='flex';['lu','lp'].forEach(id=>document.getElementById(id).value='');document.getElementById('lerr').textContent='';}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tpanel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+t));
  if(t==='calendar')renderACal();
}

function renderAll(){renderStats();renderBkList('all');renderCList();updateBadge();}
function renderStats(){
  const bk=gb(),cars=gc();
  const pend=bk.filter(b=>b.status==='pending').length;
  const conf=bk.filter(b=>b.status==='confirmed').length;
  const mo=bk.filter(b=>{if(!b.createdAt)return false;const d=new Date(b.createdAt),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).length;
  document.getElementById('sRow').innerHTML=`
    <div class="sc"><div class="sc-num">${bk.length}</div><div class="sc-lbl">Total Enquiries</div></div>
    <div class="sc"><div class="sc-num" style="color:var(--or)">${pend}</div><div class="sc-lbl">Pending</div></div>
    <div class="sc"><div class="sc-num" style="color:#64dc64">${conf}</div><div class="sc-lbl">Confirmed</div></div>
    <div class="sc"><div class="sc-num">${cars.length}</div><div class="sc-lbl">Fleet Vehicles</div></div>`;
}
function updateBadge(){const p=gb().filter(b=>b.status==='pending').length;const el=document.getElementById('pbadge');el.textContent=p;el.style.display=p?'':'none';}

let bkF='all';
function filterBk(f){bkF=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.bf===f));renderBkList(f);}
function renderBkList(filter){
  const el=document.getElementById('bkList');
  let bks=gb().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(filter!=='all')bks=bks.filter(b=>b.status===filter);
  if(!bks.length){el.innerHTML='<div class="empty"><i class="fas fa-inbox"></i><p>No '+filter+' bookings.</p></div>';return;}
  el.innerHTML=bks.map(b=>`<div class="bkrow ${b.status}">
    <div class="bkinfo">
      <div class="bkname">${b.name||'Guest'}</div>
      <div class="bkmeta">
        <span><i class="fas fa-phone"></i>${b.phone||'N/A'}</span>
        <span><i class="fas fa-envelope"></i>${b.email||'N/A'}</span>
        <span><i class="fas fa-calendar"></i>${fd(b.date)||'No date'}</span>
        <span><i class="fas fa-car"></i>${b.vehicle||'Any'}</span>
        <span><i class="fas fa-concierge-bell"></i>${b.service||'N/A'}</span>
        <span><i class="fas fa-location-dot"></i>${b.city||'N/A'}</span>
        <span><i class="fas fa-clock"></i>${fdt(b.createdAt)}</span>
      </div>
      ${b.message?'<div class="bkmsg">'+b.message+'</div>':''}
    </div>
    <span class="bkst ${b.status}">${b.status}</span>
    <div class="bkact">
      ${b.status==='pending'?'<button class="btn-sm btn-confirm" onclick="updBk('+b.id+','confirmed')"><i class="fas fa-check"></i> Confirm</button><button class="btn-sm btn-reject" onclick="updBk('+b.id+','rejected')"><i class="fas fa-times"></i> Reject</button>':
        b.status==='confirmed'?'<button class="btn-sm btn-reject" onclick="updBk('+b.id+','rejected')">Cancel</button>':
        '<button class="btn-sm btn-confirm" onclick="updBk('+b.id+','pending')">Reopen</button>'}
    </div>
  </div>`).join('');
}
function updBk(id,status){const bks=gb();const i=bks.findIndex(b=>b.id===id);if(i<0)return;bks[i].status=status;bks[i].updatedAt=new Date().toISOString();sb(bks);renderBkList(bkF);renderStats();updateBadge();showToast('Booking '+status+'.');}

let aCY,aCM;
function renderACal(){
  const el=document.getElementById('aCal');if(!el)return;
  const now=new Date();if(!aCY){aCY=now.getFullYear();aCM=now.getMonth();}
  const bks=gb().filter(b=>b.status==='confirmed'&&b.date);
  const bd={};bks.forEach(b=>{bd[b.date]=(bd[b.date]||0)+1;});
  const fd2=new Date(aCY,aCM,1).getDay(),dm=new Date(aCY,aCM+1,0).getDate();
  const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dn=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let h=`<div class="acal-hdr"><button class="acal-nav" onclick="acNav(-1)"><i class="fas fa-chevron-left"></i></button><h4>${mn[aCM]} ${aCY}</h4><button class="acal-nav" onclick="acNav(1)"><i class="fas fa-chevron-right"></i></button></div><div class="acal-grid">`;
  dn.forEach(d=>h+=`<div class="acal-dn">${d}</div>`);
  for(let i=0;i<fd2;i++)h+='<div></div>';
  for(let d=1;d<=dm;d++){
    const ds=aCY+'-'+String(aCM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const ip=new Date(aCY,aCM,d)<new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const it=d===now.getDate()&&aCM===now.getMonth()&&aCY===now.getFullYear();
    const cnt=bd[ds]||0;
    let cls='acal-d';if(ip)cls+=' past';if(it)cls+=' today';if(cnt)cls+=' hasbk';
    h+=`<div class="${cls}" ${cnt?'onclick="switchTab('bookings')"':''} title="${cnt?cnt+' booking(s)':''}">${d}${cnt?'<span class="acal-cnt">'+cnt+'</span>':''}</div>`;
  }
  h+='</div>';el.innerHTML=h;
}
function acNav(dir){aCM+=dir;if(aCM<0){aCM=11;aCY--;}if(aCM>11){aCM=0;aCY++;}renderACal();}

function renderCList(){
  const cars=gc();
  document.getElementById('cCount').textContent='('+cars.length+')';
  const el=document.getElementById('cList');
  if(!cars.length){el.innerHTML='<div class="empty"><i class="fas fa-car"></i><p>No vehicles added yet.</p></div>';return;}
  el.innerHTML=cars.map(c=>`<div class="crow">
    <img class="cthumb" src="${c.image}" onerror="this.src='${FB}'" alt="${c.name}"/>
    <div class="cinfo"><div class="cname">${c.name}</div><div class="cmeta">${c.year} · ${c.transmission} · ${c.seats} Seats · R${c.price.toLocaleString()}/day</div></div>
    <span class="cbadge">${cap(c.category)}</span>
    <button class="btn-sm btn-danger" onclick="delCar(${c.id})" title="Remove"><i class="fas fa-trash"></i></button>
  </div>`).join('');
}
function addCar(){
  const nm=document.getElementById('nN').value.trim();
  const yr=parseInt(document.getElementById('nY').value);
  const st=parseInt(document.getElementById('nS').value);
  const pr=parseInt(document.getElementById('nP').value);
  if(!nm||!yr||!st||!pr){showToast('Please fill required fields.');return;}
  const cars=gc();
  cars.push({id:Date.now(),name:nm,year:yr,category:document.getElementById('nC').value,transmission:document.getElementById('nT').value,seats:st,price:pr,image:document.getElementById('nI').value.trim()||FB,description:document.getElementById('nD').value.trim()||'Premium vehicle available for hire.'});
  sc(cars);
  ['nN','nY','nS','nP','nI','nD'].forEach(id=>document.getElementById(id).value='');
  const ok=document.getElementById('addOk');ok.style.display='block';setTimeout(()=>ok.style.display='none',2500);
  renderCList();renderStats();showToast(nm+' added ✓');
}
function delCar(id){if(!confirm('Remove this vehicle?'))return;sc(gc().filter(c=>c.id!==id));renderCList();renderStats();showToast('Vehicle removed.');}

let tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),3200);}
</script>
</body>
</html>
