<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Crown Line Chauffeurs</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--orange:#E8911A;--gold:#F5C518;--black:#000;--dark:#0a0a0a;--dark2:#111;--dark3:#1a1a1a;--white:#fff;--white-dim:rgba(255,255,255,0.65);--orange-glow:rgba(232,145,26,0.25);--radius:12px;--radius-sm:8px}
    body{font-family:'Exo 2',sans-serif;background:var(--dark);color:var(--white);min-height:100vh}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;border:none;outline:none;background:none;font-family:'Exo 2',sans-serif}
    input,select,textarea{font-family:'Exo 2',sans-serif;background:var(--dark3);border:1px solid rgba(255,255,255,0.1);color:var(--white);border-radius:var(--radius-sm);padding:0.75rem 1rem;width:100%;font-size:0.95rem;transition:border-color 0.3s,box-shadow 0.3s;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-glow)}
    select option{background:var(--dark3)}
    textarea{resize:vertical}

    /* LOGIN SCREEN */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;background:radial-gradient(ellipse at 50% 30%,rgba(232,145,26,0.08) 0%,transparent 60%)}
    .login-box{background:var(--dark2);border:1px solid rgba(232,145,26,0.3);border-radius:var(--radius);padding:3rem 2.5rem;width:100%;max-width:420px;text-align:center;box-shadow:0 0 60px rgba(0,0,0,0.8)}
    .login-logo{height:70px;width:auto;object-fit:contain;margin:0 auto 1.5rem;filter:drop-shadow(0 0 12px var(--orange-glow))}
    .login-box h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;margin-bottom:0.25rem}
    .login-box p{font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--orange);margin-bottom:2rem}
    .form-group{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;text-align:left}
    .form-group label{font-size:0.74rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--white-dim)}
    .login-error{color:#ff4d4d;font-size:0.82rem;min-height:1.2em;margin-bottom:0.5rem}
    .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;background:linear-gradient(135deg,var(--orange),var(--gold));color:var(--black);font-family:'Exo 2',sans-serif;font-weight:700;font-size:0.88rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.9rem 2rem;border-radius:50px;border:none;cursor:pointer;transition:transform 0.25s,box-shadow 0.25s;box-shadow:0 4px 18px var(--orange-glow);width:100%}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,145,26,0.5)}
    .btn-outline{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;color:var(--white-dim);font-family:'Exo 2',sans-serif;font-weight:600;font-size:0.82rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.65rem 1.25rem;border-radius:50px;border:1.5px solid rgba(232,145,26,0.4);cursor:pointer;transition:all 0.25s}
    .btn-outline:hover{border-color:var(--orange);color:var(--orange)}
    .btn-danger{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.35);color:#ff6b6b;border-radius:var(--radius-sm);padding:0.4rem 0.85rem;font-size:0.78rem;font-weight:600;transition:all 0.25s}
    .btn-danger:hover{background:#ff4d4d;color:var(--white);border-color:#ff4d4d}

    /* ADMIN PANEL */
    #adminPanel{display:none;min-height:100vh;flex-direction:column}
    #adminPanel.visible{display:flex}
    .admin-topbar{background:rgba(0,0,0,0.95);border-bottom:1px solid rgba(232,145,26,0.2);padding:0 2rem;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
    .topbar-left{display:flex;align-items:center;gap:1rem}
    .admin-topbar img{height:44px;object-fit:contain;filter:drop-shadow(0 0 6px var(--orange-glow))}
    .admin-topbar h2{font-family:'Bebas Neue',sans-serif;letter-spacing:0.15em;font-size:1.2rem;color:var(--orange)}
    .topbar-right{display:flex;align-items:center;gap:1rem}
    .view-site-btn{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--white-dim);transition:color 0.25s}
    .view-site-btn:hover{color:var(--orange)}
    .logout-btn{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--white-dim);transition:color 0.25s}
    .logout-btn:hover{color:#ff4d4d}

    .admin-body{display:grid;grid-template-columns:1fr 1.4fr;gap:2rem;padding:2rem;max-width:1200px;margin:0 auto;width:100%;flex:1;align-items:start}
    .admin-card{background:var(--dark2);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:2rem}
    .admin-card-title{font-size:0.74rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange);margin-bottom:1.5rem;display:flex;align-items:center;gap:0.5rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:1.25rem}
    .form-grid .full{grid-column:1/-1}
    .add-success{display:none;text-align:center;padding:1rem;background:rgba(232,145,26,0.08);border:1px solid rgba(232,145,26,0.3);border-radius:var(--radius-sm);margin-top:1rem;font-size:0.9rem;color:var(--orange)}

    /* CAR LIST */
    .car-list{display:flex;flex-direction:column;gap:0.85rem;max-height:580px;overflow-y:auto;padding-right:0.5rem}
    .car-list::-webkit-scrollbar{width:4px}
    .car-list::-webkit-scrollbar-track{background:transparent}
    .car-list::-webkit-scrollbar-thumb{background:rgba(232,145,26,0.3);border-radius:4px}
    .car-row{display:flex;align-items:center;gap:1rem;background:var(--dark3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);padding:0.85rem 1rem;transition:border-color 0.25s}
    .car-row:hover{border-color:rgba(232,145,26,0.25)}
    .car-thumb{width:70px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--dark2)}
    .car-row-info{flex:1;min-width:0}
    .car-row-name{font-weight:600;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .car-row-meta{font-size:0.76rem;color:var(--white-dim);margin-top:0.15rem}
    .car-row-badge{font-size:0.62rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;background:linear-gradient(135deg,var(--orange),var(--gold));color:var(--black);padding:0.18rem 0.6rem;border-radius:50px;white-space:nowrap}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--white-dim)}
    .empty-state i{font-size:2.5rem;color:var(--orange);opacity:0.25;margin-bottom:0.75rem}

    /* STATS ROW */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
    .stat-box{background:var(--dark2);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:1.25rem 1.5rem}
    .stat-box-num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;color:var(--orange);line-height:1}
    .stat-box-label{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--white-dim);margin-top:0.3rem}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--dark2);border:1px solid var(--orange);border-radius:var(--radius-sm);padding:0.85rem 1.5rem;font-size:0.86rem;z-index:9999;box-shadow:0 4px 24px var(--orange-glow);transform:translateY(100px);opacity:0;transition:transform 0.3s,opacity 0.3s;pointer-events:none}
    .toast.show{transform:translateY(0);opacity:1}

    @media(max-width:768px){
      .admin-body{grid-template-columns:1fr;padding:1.25rem}
      .form-grid{grid-template-columns:1fr}
      .form-grid .full{grid-column:1/-1}
      .stats-row{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <img src="logo.png" alt="Crown Line" class="login-logo"/>
    <h1>Admin Panel</h1>
    <p>Crown Line Chauffeurs</p>
    <div class="form-group"><label>Username</label><input type="text" id="loginUser" placeholder="Enter username" autocomplete="off"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"/></div>
    <p class="login-error" id="loginError"></p>
    <button class="btn-primary" onclick="doLogin()"><i class="fas fa-crown"></i> Login to Admin</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-topbar">
    <div class="topbar-left">
      <img src="logo.png" alt="Crown Line"/>
      <h2>Fleet Manager</h2>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="view-site-btn"><i class="fas fa-external-link-alt"></i> View Site</a>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-right-from-bracket"></i> Logout</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- LEFT: ADD VEHICLE -->
    <div>
      <div class="stats-row" id="statsRow"></div>
      <div class="admin-card">
        <p class="admin-card-title"><i class="fas fa-plus-circle"></i> Add New Vehicle</p>
        <div class="form-grid">
          <div class="form-group"><label>Vehicle Name *</label><input type="text" id="nName" placeholder="e.g. Mercedes-Benz S-Class"/></div>
          <div class="form-group"><label>Year *</label><input type="number" id="nYear" placeholder="2024" min="2000" max="2030"/></div>
          <div class="form-group"><label>Category *</label><select id="nCat"><option value="sedan">Sedan</option><option value="suv">SUV</option><option value="luxury">Luxury</option><option value="sport">Sport</option></select></div>
          <div class="form-group"><label>Transmission</label><select id="nTrans"><option value="Automatic">Automatic</option><option value="Manual">Manual</option></select></div>
          <div class="form-group"><label>Seats *</label><input type="number" id="nSeats" placeholder="4" min="1" max="9"/></div>
          <div class="form-group"><label>Price per Day (R) *</label><input type="number" id="nPrice" placeholder="3500"/></div>
          <div class="form-group full"><label>Image URL</label><input type="url" id="nImage" placeholder="https://images.unsplash.com/..."/></div>
          <div class="form-group full"><label>Description</label><textarea id="nDesc" rows="2" placeholder="Brief vehicle description..."></textarea></div>
        </div>
        <button class="btn-primary" onclick="addCar()"><i class="fas fa-plus"></i> Add to Fleet</button>
        <div class="add-success" id="addSuccess"><i class="fas fa-check-circle"></i> Vehicle added successfully!</div>
      </div>
    </div>

    <!-- RIGHT: CURRENT FLEET -->
    <div class="admin-card">
      <p class="admin-card-title"><i class="fas fa-car-side"></i> Current Fleet <span id="carCountBadge" style="margin-left:0.5rem;font-family:'Exo 2',sans-serif;font-size:0.9rem;color:var(--white-dim);font-weight:600;letter-spacing:0"></span></p>
      <div class="car-list" id="carList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_USER='admin', ADMIN_PASS='crownline2023';
const LS_KEY='crownline_v3_cars';
const FALLBACK_IMG='https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800&auto=format&fit=crop&q=60';

function getCars(){try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):[]}catch{return[]}}
function saveCars(c){localStorage.setItem(LS_KEY,JSON.stringify(c))}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(u===ADMIN_USER&&p===ADMIN_PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminPanel').classList.add('visible');
    renderAll();
  }else{
    document.getElementById('loginError').textContent='Invalid credentials. Please try again.';
    document.getElementById('loginPass').value='';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')doLogin()});

function doLogout(){
  document.getElementById('adminPanel').classList.remove('visible');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').textContent='';
}

function renderStats(){
  const cars=getCars();
  const byCat={sedan:0,suv:0,luxury:0,sport:0};
  cars.forEach(c=>{if(byCat[c.category]!==undefined)byCat[c.category]++});
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-box"><div class="stat-box-num">${cars.length}</div><div class="stat-box-label">Total Vehicles</div></div>
    <div class="stat-box"><div class="stat-box-num">${byCat.luxury+byCat.sport}</div><div class="stat-box-label">Luxury / Sport</div></div>
    <div class="stat-box"><div class="stat-box-num">${byCat.sedan+byCat.suv}</div><div class="stat-box-label">Sedan / SUV</div></div>
  `;
}
function renderCarList(){
  const cars=getCars();
  const list=document.getElementById('carList');
  const badge=document.getElementById('carCountBadge');
  badge.textContent=`(${cars.length})`;
  if(!cars.length){list.innerHTML=`<div class="empty-state"><i class="fas fa-car"></i><p>No vehicles added yet.</p></div>`;return}
  list.innerHTML=cars.map(car=>`
    <div class="car-row">
      <img class="car-thumb" src="${car.image}" alt="${car.name}" onerror="this.src='${FALLBACK_IMG}'"/>
      <div class="car-row-info">
        <div class="car-row-name">${car.name}</div>
        <div class="car-row-meta">${car.year} · ${car.transmission} · ${car.seats} Seats · R${car.price.toLocaleString()}/day</div>
      </div>
      <span class="car-row-badge">${cap(car.category)}</span>
      <button class="btn-danger" onclick="deleteCar(${car.id})" title="Delete"><i class="fas fa-trash"></i></button>
    </div>`).join('');
}
function renderAll(){renderStats();renderCarList()}

function addCar(){
  const name=document.getElementById('nName').value.trim();
  const year=parseInt(document.getElementById('nYear').value);
  const cat=document.getElementById('nCat').value;
  const trans=document.getElementById('nTrans').value;
  const seats=parseInt(document.getElementById('nSeats').value);
  const price=parseInt(document.getElementById('nPrice').value);
  const image=document.getElementById('nImage').value.trim()||FALLBACK_IMG;
  const desc=document.getElementById('nDesc').value.trim();
  if(!name||!year||!seats||!price){showToast('Please fill all required fields.');return}
  const cars=getCars();
  cars.push({id:Date.now(),name,year,category:cat,transmission:trans,seats,price,image,description:desc||`A premium ${cat} vehicle available for hire.`});
  saveCars(cars);
  ['nName','nYear','nSeats','nPrice','nImage','nDesc'].forEach(id=>document.getElementById(id).value='');
  const ok=document.getElementById('addSuccess');ok.style.display='block';setTimeout(()=>ok.style.display='none',2500);
  showToast(`${name} added to fleet! ✓`);
  renderAll();
}

function deleteCar(id){
  const cars=getCars().filter(c=>c.id!==id);
  saveCars(cars);renderAll();
  showToast('Vehicle removed from fleet.');
}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000)}
</script>
</body>
</html>
